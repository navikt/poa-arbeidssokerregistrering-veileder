# ──────────────────────────────────────────────────────────────
# Dependabot-strategi
#
# Pakker grupperes etter domene (minor + patch) → færre PRer.
# Major-oppdateringer er bevisst ikke gruppert → individuell
# vurdering av breaking changes.
#
# react og react-dom versjonerer alltid i lockstep og er gruppert
# sammen med sine @types-pakker. De bør aldri oppdateres separat.
#
# next, @unleash/nextjs og @grafana/faro-web-sdk er ikke gruppert
# — disse bør alltid vurderes for seg selv pga. breaking changes.
#
# Dersom én pakke i en gruppe-PR feiler i CI:
#   1. Finn pakken i CI-loggen
#   2. Kommenter i PR-en: @dependabot exclude [pakkenavn]
#   3. Dependabot trekker pakken ut som egen PR
#   4. Merge gruppe-PR-en, løs den separate PR-en for seg
# ──────────────────────────────────────────────────────────────
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Oslo
    cooldown:
      default-days: 7
      semver-major-days: 14
    open-pull-requests-limit: 10
    groups:
      # React-pakker — react og react-dom versjonerer alltid i lockstep
      # og må aldri havne på ulike versjoner
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - minor
          - patch
      # NAV-pakker (Aksel, utils) — beveger seg ofte i takt
      nav-pakker:
        patterns:
          - "@navikt/*"
        update-types:
          - minor
          - patch
      # Storybook og komponentutvikling
      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"
          - "@chromatic-com/*"
          - "msw-storybook-addon"
        update-types:
          - minor
          - patch
      # Testverktøy
      testing:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "jsdom"
          - "msw"
        update-types:
          - minor
          - patch
      # CSS-pipeline
      styling:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss"
        update-types:
          - minor
          - patch
      # TypeScript og type-definisjoner
      typescript-og-typer:
        patterns:
          - "typescript"
          - "@types/*"
        update-types:
          - minor
          - patch
      # Dev-verktøy uten runtime-påvirkning
      dev-verktoy:
        patterns:
          - "@biomejs/biome"
          - "husky"
          - "lint-staged"
          - "knip"
          - "pino-pretty"
          - "loadjs"
          - "nanoid"
        update-types:
          - minor
          - patch
    # next, @grafana/faro-web-sdk og @unleash/nextjs
    # er bevisst ikke gruppert — vurderes individuelt pga. breaking changes

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Oslo
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    ignore:
      # Nais-actions bruker floating major tags (v2, v0) uten semver-releases.
      # Ignorer patch/minor (SHA-endringer), men la major (v2→v3) trigge.
      - dependency-name: "nais/deploy"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
      - dependency-name: "nais/docker-build-push"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
    groups:
      github-actions:
        patterns:
          - "*"